<div
  class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
>
  <div class="bg-white rounded-lg p-6 max-w-sm w-full mx-4">
    <h3 class="text-lg font-semibold text-[#0E0E10] mb-4">
      Enter Transaction PIN
    </h3>

    <form [formGroup]="pinForm" (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <input
          type="password"
          formControlName="pin"
          maxlength="4"
          placeholder="****"
          class="w-full px-4 py-3 text-center text-2xl tracking-widest border border-[#9A9A9A] rounded-lg focus:outline-none focus:border-[#1E4D3A] focus:ring-2 focus:ring-[#1E4D3A]/40"
          inputmode="numeric"
          pattern="[0-9]*"
          autofocus
        />
        @if (pinForm.get("pin")?.invalid && pinForm.get("pin")?.touched) {
          <p class="mt-1 text-xs text-red-600">
            Please enter a valid 4-digit PIN
          </p>
        }
      </div>

      <div class="flex gap-3">
        <button
          type="button"
          (click)="onCancel()"
          class="flex-1 px-4 py-2 border border-[#9A9A9A] rounded-lg text-[#0E0E10] hover:bg-[#EFEFEF] transition"
        >
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="pinForm.invalid || isLoading"
          class="flex-1 px-4 py-2 bg-[#134D3A] text-white rounded-lg hover:bg-[#0F3F30] transition disabled:opacity-50"
        >
          @if (isLoading) {
            <span>Verifying...</span>
          } @else {
            Confirm
          }
        </button>
      </div>
    </form>
  </div>
</div>
