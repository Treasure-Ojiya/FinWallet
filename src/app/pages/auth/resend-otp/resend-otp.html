<main class="min-h-screen grid place-items-center bg-[#F5F7FA]">
  <div
    class="border border-[#E0E4E8] rounded-xl p-6 w-full max-w-md shadow-xl bg-white"
  >
    <form
      [formGroup]="otpForm"
      (ngSubmit)="onResendOtp()"
      class="flex flex-col gap-5"
    >
      <!-- Title -->
      <div class="text-center">
        <h3 class="text-[#1A202C] font-bold text-2xl">Resend OTP</h3>
        <p class="text-[#4A5568] text-sm mt-1">
          Enter your email to receive a new verification code
        </p>
      </div>

      <!-- Email -->
      <div class="flex flex-col gap-1.5">
        <label class="text-[#4A5568] font-medium text-sm">Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          class="p-3 border border-[#E0E4E8] rounded-lg w-full focus:border-[#00B074] focus:outline-none focus:ring-2 focus:ring-[#00B074]/20 transition-all duration-200 text-[#1A202C] placeholder-[#9AA6B8]"
          [class.border-[#FF6B6B]]="
            otpForm.get('email')?.invalid && otpForm.get('email')?.touched
          "
        />
        @if (otpForm.get("email")?.invalid && otpForm.get("email")?.touched) {
          <div class="text-[#FF6B6B] text-sm mt-1">
            @if (otpForm.get("email")?.errors?.["required"]) {
              <span>Email is required</span>
            }
            @if (otpForm.get("email")?.errors?.["email"]) {
              <span>Please enter a valid email</span>
            }
          </div>
        }
      </div>

      <!-- Submit Button with Loading State -->
      <div>
        <button
          type="submit"
          [disabled]="otpForm.invalid || loader"
          class="w-full text-white bg-linear-to-r from-[#1E4D34] to-[#00B074] font-semibold rounded-lg p-3 hover:from-[#00B074] hover:to-[#1E4D34] transition-all duration-300 shadow-md hover:shadow-lg transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:transform-none"
        >
          @if (loader) {
            <span class="flex items-center justify-center gap-2">
              <svg
                class="animate-spin h-5 w-5 text-white"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
              >
                <circle
                  class="opacity-25"
                  cx="12"
                  cy="12"
                  r="10"
                  stroke="currentColor"
                  stroke-width="4"
                ></circle>
                <path
                  class="opacity-75"
                  fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                ></path>
              </svg>
              Sending...
            </span>
          } @else {
            <span>Resend OTP</span>
          }
        </button>
      </div>

      <!-- Success Message (Optional - show when OTP is sent) -->
      <!-- @if (otpSent) {
        <div class="bg-[#E8F5E9] text-[#1E4D34] p-3 rounded-lg text-sm text-center">
          ✓ New OTP has been sent to your email
        </div>
      } -->

      <!-- Back to Login -->
      <div class="text-center pt-2 border-t border-[#E0E4E8]">
        <a
          routerLink="/auth/login"
          class="text-[#4A5568] hover:text-[#1E4D34] text-sm font-medium transition-colors duration-200 flex items-center justify-center gap-1"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10 19l-7-7m0 0l7-7m-7 7h18"
            />
          </svg>
          Back to Login
        </a>
      </div>
    </form>
  </div>
</main>
