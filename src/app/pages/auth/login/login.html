<main class="min-h-screen grid place-items-center">
  <div
    class="border border-[#E0E4E8] rounded-xl p-6 w-full max-w-md shadow-xl bg-white"
  >
    <form
      [formGroup]="loginForm"
      (ngSubmit)="onLogin()"
      class="flex flex-col gap-5"
    >
      <div class="text-center">
        <h3 class="text-[#1A202C] font-bold text-2xl">Welcome Back</h3>
        <p class="text-[#4A5568] text-sm mt-1">Sign in to your account</p>
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-[#4A5568] font-medium text-sm">Email</label>
        <input
          type="email"
          formControlName="email"
          class="p-3 border border-[#E0E4E8] focus:border-[#00B074] focus:outline-none focus:ring-2 focus:ring-[#00B074]/20 rounded-lg w-full transition-all duration-200 text-[#1A202C] placeholder-[#9AA6B8]"
          placeholder="you@example.com"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-[#4A5568] font-medium text-sm">Password</label>

        <div class="relative">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            class="p-3 pr-10 border border-[#E0E4E8] focus:border-[#00B074] focus:outline-none focus:ring-2 focus:ring-[#00B074]/20 rounded-lg w-full transition-all duration-200 text-[#1A202C]"
            placeholder="••••••••"
          />

          <button
            type="button"
            class="absolute right-3 top-1/2 -translate-y-1/2 focus:outline-none group"
            (click)="togglePassword()"
          >
            <img
              [src]="
                showPassword ? '/icons/eye-view.svg' : '/icons/eye-hide.svg'
              "
              alt="toggle password visibility"
              class="w-5 h-5 opacity-60 group-hover:opacity-100 transition-opacity duration-200"
            />
          </button>
        </div>
      </div>

      <div class="flex justify-end">
        <a
          routerLink="/auth/forgot-password"
          class="text-[#00B074] hover:text-[#1E4D34] text-sm font-medium transition-colors duration-200"
        >
          Forgot password?
        </a>
      </div>

      <div>
        <button
          type="submit"
          class="w-full text-white bg-linear-to-r from-[#1E4D34] to-[#00B074] font-semibold rounded-lg p-3 hover:from-[#00B074] hover:to-[#1E4D34] transition-all duration-300 shadow-md hover:shadow-lg transform hover:-translate-y-0.5"
        >
          Sign In
        </button>
      </div>

      <div class="relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-[#E0E4E8]"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-4 bg-white text-[#4A5568]">or</span>
        </div>
      </div>

      <div class="text-center">
        <p class="text-[#4A5568] text-sm">
          Don't have an account?
