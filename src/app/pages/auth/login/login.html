<main class="min-h-screen grid place-items-center">
  <div
    class="border border-[#BFC5C9] rounded-lg p-4 w-full max-w-md shadow-md shadow-[#1E4D3A]/20"
  >
    <form
      [formGroup]="loginForm"
      (ngSubmit)="onLogin()"
      class="flex flex-col gap-4"
    >
      <div class="text-center">
        <h3 class="text-[#0E0E10] font-bold text-lg">Sign In</h3>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-[#3A3A3C]">Email</label>
        <input
          type="email"
          formControlName="email"
          class="p-2 border border-[#9A9A9A] focus:border-[#1E4D3A] focus:outline-none focus:ring-2 focus:ring-[#1E4D3A]/40 rounded-lg w-full"
        />
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-[#3A3A3C]">Password</label>
        <input
          type="password"
          formControlName="password"
          class="p-2 border border-[#9A9A9A] focus:border-[#1E4D3A] focus:outline-none focus:ring-2 focus:ring-[#1E4D3A]/40 rounded-lg w-full"
        />
      </div>

      <div>
        <button
          type="submit"
          class="w-full text-[#EFEFEF] bg-[#1E4D3A] font-semibold rounded-lg p-2 cursor-pointer hover:text-[#1E4D3A] hover:bg-[#BFC5C9] transition-colors duration-300"
        >
          Sign In
        </button>
      </div>

      <div class="text-center">
        <p class="auth-link text-[#3A3A3C] text-sm font-medium">
          Don’t have an account?
          <a
            routerLink="/auth/register"
            class="text-[#3A3A3C] hover:text-[#1E4D3A] font-semibold text-sm"
            >Register</a
          >
        </p>
      </div>
    </form>
  </div>
</main>
