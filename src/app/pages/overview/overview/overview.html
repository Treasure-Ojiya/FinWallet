<main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-0">
  <section class="mt-8">
    <!-- Balance Card -->
    <div
      class="relative flex flex-col md:flex-row md:items-center md:justify-between bg-[#134D3A] rounded-2xl p-6 md:p-8 cursor-pointer hover:shadow-xl transition"
      routerLink="/wallet-details"
    >
      <!-- Balance Info -->
      <div>
        <div class="flex items-center gap-2">
          <h2 class="text-sm uppercase tracking-wide text-[#EFEFEF]/80">
            Current Balance
          </h2>

          <!-- Prevent card click -->
          <button
            type="button"
            class="focus:outline-none"
            (click)="toggleBalance($event); $event.stopPropagation()"
          >
            <img
              [src]="
                showBalance
                  ? '/icons/view-white.svg'
                  : '/icons/view-hide-white.svg'
              "
              alt=""
              class="w-5 h-5 opacity-80 hover:opacity-100 transition"
            />
          </button>
        </div>

        <p class="text-3xl md:text-4xl font-bold mt-3 text-[#EFEFEF]">
          {{
            showBalance ? (balance | currency: "NGN" : "symbol") : "₦ ••••••"
          }}
        </p>
      </div>

      <!-- Actions -->
      <div class="flex gap-8 mt-6 md:mt-0" (click)="$event.stopPropagation()">
        <!-- Top Up -->
        <button
          routerLink="/top-up"
          class="flex flex-col items-center gap-2 group"
        >
          <div
            class="bg-[#BFC5C9]/20 rounded-xl w-12 h-12 flex items-center justify-center group-hover:bg-[#BFC5C9]/30 transition"
          >
            <img src="/icons/top-up.svg" alt="Top Up" class="w-5 h-5" />
          </div>
          <span class="text-sm font-medium text-[#EFEFEF]"> Top-Up </span>
        </button>

        <!-- Send -->
        <button
          routerLink="/transfer"
          class="flex flex-col items-center gap-2 group"
        >
          <div
            class="bg-[#BFC5C9]/20 rounded-xl w-12 h-12 flex items-center justify-center group-hover:bg-[#BFC5C9]/30 transition"
          >
            <img src="/icons/send.svg" alt="Send" class="w-5 h-5" />
          </div>
          <span class="text-sm font-medium text-[#EFEFEF]"> Send </span>
        </button>
      </div>
    </div>
  </section>

  <section class="mt-10 max-w-3xl mx-auto">
    <div
      class="grid grid-cols-2 gap-6 bg-[#BFC5C9]/20 rounded-2xl p-6 justify-items-center text-center"
    >
      <div>
        <div
          class="bg-[#1E4D3A]/50 rounded-full p-4 flex flex-col items-center justify-center"
        >
          <img src="/icons/phone-white.svg" alt="Analytics" class="w-6 h-6" />
        </div>
        <h3 class="text-sm font-semibold text-[#0E0E10] mt-2">Airtime</h3>
      </div>

      <div>
        <div
          class="bg-[#1E4D3A]/50 rounded-full p-4 flex flex-col items-center justify-center"
        >
          <img src="/icons/electricity-white.svg" alt="" class="w-6 h-6" />
        </div>
        <h3 class="text-sm font-semibold text-[#0E0E10] mt-2">Electricity</h3>
      </div>
    </div>
  </section>

  <section class="mt-10 px-2">
    <h1 class="text-[#0E0E10] text-lg font-bold mb-4">Recent Transactions</h1>

    <div class="overflow-x-auto">
      <table class="w-full border-collapse min-w-150">
        <thead>
          <tr>
            <th
              class="text-left p-2 font-semibold text-[#0E0E10] border-b-2 border-[#BFC5C9] rounded-b-lg"
            >
              Transaction Type
            </th>
            <th
              class="text-left p-2 font-semibold text-[#0E0E10] border-b-2 border-[#BFC5C9] rounded-b-lg"
            >
              Date
            </th>
            <th
              class="text-left p-2 font-semibold text-[#0E0E10] border-b-2 border-[#BFC5C9] rounded-b-lg"
            >
              Category
            </th>
            <th
              class="text-left p-2 font-semibold text-[#0E0E10] border-b-2 border-[#BFC5C9] rounded-b-lg"
            >
              Amount
            </th>
            <th
              class="text-left p-2 font-semibold text-[#0E0E10] border-b-2 border-[#BFC5C9] rounded-b-lg"
            >
              Status
            </th>
          </tr>
        </thead>
        <tbody class="bg-red">
          <tr class="hover:bg-amber-100 transition-colors"></tr>
        </tbody>
      </table>
    </div>
  </section>
</main>
