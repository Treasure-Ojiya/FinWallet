<div class="flex h-screen overflow-hidden bg-[#F5F7FA]">
  <!-- Side Navigation - Fixed width, full height -->
  @if (showNav) {
    <app-app-nav class="hidden md:block w-64 shrink-0 h-full"></app-app-nav>
  }

  <!-- Main Content Area -->
  <main class="flex-1 overflow-y-auto">
    <!-- Mobile Header (only shows on mobile when side nav is hidden) -->
    <div
      class="md:hidden sticky top-0 z-40 bg-white border-b border-[#E0E4E8] px-4 py-3 flex items-center justify-between"
    >
      <div class="text-[#1E4D34] text-xl font-bold">
        Fin<span class="text-[#00B074]">Wallet</span>
      </div>

      <!-- Mobile Menu Button -->
      <button
        class="p-2 text-[#1E4D34] hover:text-[#00B074] transition-colors duration-200"
        (click)="toggleMobileNav()"
      >
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </button>
    </div>

    <!-- Router Outlet with responsive padding -->
    <div class="p-4 md:p-6 lg:p-8">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>

<!-- Mobile Side Navigation Drawer (only shows when toggled) -->
@if (showNav) {
  <div
    class="fixed inset-0 z-50 md:hidden transition-opacity duration-300"
    [class.opacity-0]="!mobileNavOpen"
    [class.opacity-100]="mobileNavOpen"
    [class.pointer-events-none]="!mobileNavOpen"
  >
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/50" (click)="toggleMobileNav()"></div>

    <!-- Drawer -->
    <div
      class="absolute left-0 top-0 h-full w-64 bg-white transform transition-transform duration-300 ease-in-out"
      [class.-translate-x-full]="!mobileNavOpen"
      [class.translate-x-0]="mobileNavOpen"
    >
      <app-app-nav></app-app-nav>
    </div>
  </div>
}
